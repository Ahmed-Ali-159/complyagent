llm:
  supervisor_model: "llama-3.3-70b-versatile"
  worker_model: "llama-3.3-70b-versatile"
  provider: "groq"
  temperature: 0.0
  max_tokens: 4096

retrieval:
  embedding_model: "BAAI/bge-small-en-v1.5"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  chunk_size: 512
  chunk_overlap: 50
  bm25_weight: 0.4
  dense_weight: 0.6
  initial_k: 20
  final_k: 5
  collection_name: "gdpr_articles"

graph:
  max_iterations: 15
  stale_state_threshold: 3
  confidence_threshold: 0.6
  max_reretrieval: 2

paths:
  data_dir: "./data"
  chroma_persist_dir: "./data/chroma"
  policies_dir: "./data/policies"
  processed_dir: "./data/processed"
  eval_dir: "./data/eval"