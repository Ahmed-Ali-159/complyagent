llm:
  provider: "groq"  # "groq" | "cerebras" - switches which client factory is used
  supervisor_model: "openai/gpt-oss-120b"
  worker_model: "openai/gpt-oss-120b"
  temperature: 0.0
  max_tokens: 4096

retrieval:
  embedding_model: "BAAI/bge-base-en-v1.5"
  reranker_model: "BAAI/bge-reranker-v2-m3"
  bm25_weight: 0.4
  dense_weight: 0.6
  initial_k: 20
  final_k: 5
  collection_name: "gdpr_regulation"

graph:
  max_iterations: 15
  stale_state_threshold: 3
  confidence_threshold: 0.6
  max_reretrieval: 2

paths:
  data_dir: "./data"
  chroma_persist_dir: "./data/chroma"
  policies_dir: "./data/policies"
  processed_dir: "./data/processed"
  eval_dir: "./data/eval"